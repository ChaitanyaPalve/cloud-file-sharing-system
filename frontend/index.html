<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cloud File Sharing System</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-web"></div>

  <header>
    <h1>🕷️ Cloud File Sharing System</h1>
    <p>Secure Login • Register • Upload Files</p>
  </header>

  <main class="container">
    <section class="card">
      <h2>Register</h2>
      <input type="text" id="regName" placeholder="Enter Name" />
      <input type="email" id="regEmail" placeholder="Enter Email" />
      <input type="password" id="regPassword" placeholder="Enter Password" />
      <button onclick="registerUser()">Register</button>
    </section>

    <section class="card">
      <h2>Login</h2>
      <input type="email" id="loginEmail" placeholder="Enter Email" />
      <input type="password" id="loginPassword" placeholder="Enter Password" />
      <button onclick="loginUser()">Login</button>
    </section>

    <section class="card upload-card">
      <h2>Upload File</h2>
      <input type="file" id="fileInput" />
      <button onclick="uploadFile()">Upload File</button>
    </section>
  </main>

  <div id="message"></div>

  <footer>
    <p>Made with ❤️ by Team Cloud File Sharing</p>
  </footer>

  <script src="style.js"></script>
</body>
</html>
